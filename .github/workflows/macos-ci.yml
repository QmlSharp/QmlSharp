name: macOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    name: macOS (FASTBuild)
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install CMake if needed
        run: |
          required_version='4.2.0'
          current_version="$(cmake --version 2>/dev/null | head -n 1 | awk '{print $3}' || true)"

          if [[ -n "${current_version}" ]] && python3 - "${current_version}" "${required_version}" <<'PY'
          import re
          import sys

          def parse(version: str):
              match = re.match(r'^(\d+)\.(\d+)\.(\d+)', version)
              return tuple(map(int, match.groups())) if match else None

          current = parse(sys.argv[1])
          required = parse(sys.argv[2])
          sys.exit(0 if current and required and current >= required else 1)
          PY
          then
            echo "CMake ${current_version} already satisfies ${required_version}"
          else
            brew install cmake
            echo "$(brew --prefix cmake)/bin" >> "${GITHUB_PATH}"
          fi

      - name: Install FASTBuild
        run: |
          fastbuild_url='https://www.fastbuild.org/downloads/v1.19/FASTBuild-OSX-x64+ARM-v1.19.zip'
          fastbuild_archive="${RUNNER_TEMP}/fastbuild.zip"
          fastbuild_root="${RUNNER_TEMP}/fastbuild"
          curl -fsSL "${fastbuild_url}" -o "${fastbuild_archive}"
          mkdir -p "${fastbuild_root}"
          unzip -q "${fastbuild_archive}" -d "${fastbuild_root}"

          fbuild_exe="$(find "${fastbuild_root}" -type f -name FBuild | head -n 1)"
          if [[ -z "${fbuild_exe}" ]]; then
            echo 'FBuild not found after FASTBuild installation' >&2
            exit 1
          fi

          chmod +x "${fbuild_exe}"
          echo "$(dirname "${fbuild_exe}")" >> "${GITHUB_PATH}"
          echo "FASTBuild installed to $(dirname "${fbuild_exe}")"

      - name: Install pre-commit
        run: |
          precommit_venv="${RUNNER_TEMP}/pre-commit-venv"
          python3 -m venv "${precommit_venv}"
          source "${precommit_venv}/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install pre-commit
          echo "${precommit_venv}/bin" >> "${GITHUB_PATH}"

      - name: Verify tool versions
        run: |
          echo "dotnet:     $(dotnet --version)"
          echo "CMake:      $(cmake --version | head -n 1)"
          echo "Clang:      $(clang --version | head -n 1)"
          echo "Python:     $(python3 --version)"
          echo "pip:        $(python3 -m pip --version)"
          echo "pre-commit: $(pre-commit --version)"
          echo "FASTBuild:  $(FBuild -version | head -n 1)"

      - name: Restore .NET solution
        run: dotnet restore QmlSharp.sln

      - name: Build .NET solution
        run: dotnet build QmlSharp.sln --configuration Debug --no-restore

      - name: Test .NET solution
        run: dotnet test QmlSharp.sln --configuration Debug --no-build --verbosity normal

      - name: Check .NET formatting
        run: dotnet format QmlSharp.sln --verify-no-changes --verbosity minimal

      - name: Configure (CMake)
        env:
          CC: clang
          CXX: clang++
        run: cmake --preset macos-ci

      - name: Build (FASTBuild)
        env:
          CC: clang
          CXX: clang++
        run: cmake --build --preset macos-ci

      - name: Run pre-commit hooks
        run: |
          set +e
          pre-commit run --all-files --show-diff-on-failure --color=always
          status=$?
          set -e
          if [[ ${status} -eq 0 ]]; then
            exit 0
          fi
          echo 'pre-commit made changes; rerunning once'
          pre-commit run --all-files --show-diff-on-failure --color=always
