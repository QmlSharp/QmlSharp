name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  build:
    name: Windows x64 (FASTBuild)
    runs-on: windows-2022
    timeout-minutes: 120
    env:
      MSBUILDDISABLENODEREUSE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore Qt 6.11.0 cache
        id: qtcache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}\..\Qt\6.11.0\msvc2022_64
          key: qt-windows-6.11.0-msvc2022-64-qtbase-qtdeclarative-v1

      - name: Install Qt 6.11.0
        if: steps.qtcache.outputs.cache-hit != 'true'
        run: |
          # TODO: Switch this back to jurplel/install-qt-action once aqtinstall supports
          # the Qt 6.11.0 Windows msvc2022_64 repository layout used by download.qt.io.
          $qtRoot = Join-Path (Split-Path $env:GITHUB_WORKSPACE -Parent) 'Qt\6.11.0\msvc2022_64'
          New-Item -ItemType Directory -Force -Path $qtRoot | Out-Null

          $sevenZip = (Get-Command 7z -ErrorAction SilentlyContinue).Source
          if (-not $sevenZip) {
            $sevenZip = Join-Path $env:ProgramFiles '7-Zip\7z.exe'
          }

          if (-not (Test-Path $sevenZip)) {
            throw '7z was not found on the Windows runner.'
          }

          $packageRoot = 'https://download.qt.io/online/qtsdkrepository/windows_x86/desktop/qt6_6110/qt6_6110_msvc2022_64/qt.qt6.6110.win64_msvc2022_64'
          $packages = @(
            @{
              Name = '6.11.0-0-202603180535qtbase-Windows-Windows_11_24H2-MSVC2022-Windows-Windows_11_24H2-X86_64.7z'
              Sha256 = 'ba0e343cb8aa067f04d6f2e54a60d911660df0aac5cf9f096f1a8a98467f8614'
            },
            @{
              Name = '6.11.0-0-202603180535qtdeclarative-Windows-Windows_11_24H2-MSVC2022-Windows-Windows_11_24H2-X86_64.7z'
              Sha256 = 'b4da442317a2d7a2bc932a3ec5b4742c19b672d1a7db5bff4793b0abd15c0f69'
            }
          )

          foreach ($package in $packages) {
            $archive = Join-Path $env:RUNNER_TEMP $package.Name
            Invoke-WebRequest -Uri "$packageRoot/$($package.Name)" -OutFile $archive

            $actualSha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $archive).Hash.ToLowerInvariant()
            if ($actualSha256 -ne $package.Sha256) {
              throw "Qt package SHA256 mismatch for $($package.Name). Expected $($package.Sha256), got $actualSha256."
            }

            & $sevenZip x $archive "-o$qtRoot" -y
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to extract $($package.Name)."
            }
          }

      - name: Export Qt environment
        run: |
          $qtRoot = Join-Path (Split-Path $env:GITHUB_WORKSPACE -Parent) 'Qt\6.11.0\msvc2022_64'
          if (-not (Test-Path $qtRoot)) {
            throw "Qt root directory does not exist: $qtRoot"
          }

          $qt6Dir = Join-Path $qtRoot 'lib\cmake\Qt6'
          if (-not (Test-Path $qt6Dir)) {
            throw "Qt6Config.cmake not found under $qt6Dir"
          }

          "QT_ROOT_DIR=$qtRoot" >> $env:GITHUB_ENV
          "QT_DIR=$qtRoot" >> $env:GITHUB_ENV
          "Qt6_DIR=$qt6Dir" >> $env:GITHUB_ENV
          (Join-Path $qtRoot 'bin') >> $env:GITHUB_PATH
          Write-Host "QT_DIR=$qtRoot"
          Write-Host "Qt6_DIR=$qt6Dir"

      - name: Install CMake (Scoop)
        uses: MinoruSekine/setup-scoop@v4
        with:
          apps: cmake

      - name: Verify CMake version
        run: |
          $requiredVersion = [version]'4.2.0'
          $versionOutput = cmake --version | Select-Object -First 1
          if ($versionOutput -notmatch '^cmake version (\d+\.\d+\.\d+)') {
            throw "Unable to determine installed CMake version from output: $versionOutput"
          }

          $installedVersion = [version]$Matches[1]
          if ($installedVersion -lt $requiredVersion) {
            throw "CMake $requiredVersion or newer is required by CMakePresets.json, but Scoop installed $installedVersion."
          }

          Write-Host "Using CMake $installedVersion"

      - name: Install FASTBuild
        run: |
          $url = 'https://www.fastbuild.org/downloads/v1.19/FASTBuild-Windows-x64-v1.19.zip'
          $expectedSha256 = '30ba4bff1afea10a7d9cd02740cbca7a42a4539a16e8cd7e221223c238951ff6'
          $zip = Join-Path $env:RUNNER_TEMP 'fastbuild.zip'
          $dest = Join-Path $env:RUNNER_TEMP 'fastbuild'
          Invoke-WebRequest -Uri $url -OutFile $zip
          $actualSha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $zip).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) {
            throw "FASTBuild archive SHA256 mismatch. Expected $expectedSha256, got $actualSha256."
          }

          Expand-Archive -Path $zip -DestinationPath $dest -Force

          $exe = Get-ChildItem $dest -Recurse -Filter FBuild.exe | Select-Object -First 1
          if (-not $exe) {
            throw 'FBuild.exe not found after FASTBuild installation'
          }

          $exe.DirectoryName >> $env:GITHUB_PATH
          Write-Host "FASTBuild installed to $($exe.DirectoryName)"

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Detect Windows SDK
        run: |
          $rc = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Recurse -Filter rc.exe |
                Where-Object { $_.FullName -match '\\x64\\' } |
                Sort-Object FullName |
                Select-Object -Last 1
          if (-not $rc) {
            throw 'rc.exe not found in Windows SDK'
          }

          Write-Host "Found rc.exe -> $($rc.DirectoryName)"
          "WindowsKitRC=$($rc.DirectoryName)" >> $env:GITHUB_ENV
          $rc.DirectoryName >> $env:GITHUB_PATH

      - name: Resolve FASTBuild cache path
        id: fbcache
        run: |
          $fbCache = Join-Path $env:LOCALAPPDATA 'FASTBuild' 'Cache'
          New-Item $fbCache -ItemType Directory -Force | Out-Null
          "path=$fbCache" >> $env:GITHUB_OUTPUT
          Write-Host "FASTBuild cache: $fbCache"

      - name: Restore FASTBuild compilation cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.fbcache.outputs.path }}
          key: fbcache-windows-${{ github.sha }}
          restore-keys: fbcache-windows-

      - name: Verify tool versions
        run: |
          Write-Host "dotnet: $(& dotnet --version)"
          Write-Host "CMake:  $(cmake --version | Select-Object -First 1)"
          Write-Host "MSVC:   $(cl 2>&1 | Select-Object -First 1)"
          Write-Host "Clang:  $(clang-cl --version | Select-Object -First 1)"
          Write-Host "FBuild: $(FBuild.exe -version 2>&1 | Select-Object -First 1)"
          Write-Host "Windows SDK RC: $env:WindowsKitRC"
          Write-Host "QT_DIR: $env:QT_DIR"
          Write-Host "Qt6_DIR: $env:Qt6_DIR"

      - name: Restore .NET solution
        run: dotnet restore QmlSharp.slnx

      - name: Build .NET solution
        run: dotnet build QmlSharp.slnx --configuration Debug --no-restore

      - name: Configure (CMake)
        env:
          CC: clang-cl
          CXX: clang-cl
        run: cmake --preset windows-ci

      - name: Build (FASTBuild)
        env:
          CC: clang-cl
          CXX: clang-cl
        run: cmake --build --preset ci

      - name: Test native target
        run: ctest --preset windows-ci

      - name: Test .NET solution
        run: dotnet test QmlSharp.slnx --configuration Debug --no-build --verbosity normal -m:1

      - name: Check .NET formatting
        run: |
          $env:MSBUILDDISABLENODEREUSE = "1"
          dotnet format QmlSharp.slnx --verify-no-changes --no-restore --verbosity minimal

      - name: Trim FASTBuild cache
        if: always()
        run: |
          $buildDir = "${{ github.workspace }}\build\windows-ci"
          if (Test-Path $buildDir) {
            Push-Location $buildDir
            FBuild.exe -cachetrim 10240
            Pop-Location
          }
